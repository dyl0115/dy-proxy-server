server {
    listen 80;
    server_name $DOMAIN;
    return 301 https://$host$request_uri; # HTTP → HTTPS 리다이렉트
}

server {
    listen 443 ssl;
    server_name $DOMAIN;

    ssl_certificate /etc/letsencrypt/live/$DOMAIN/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/$DOMAIN/privkey.pem;

    # === SERVERS START ===
    # === SERVERS END ===
}